name: Keepalive Ping (Render Cold Start 방지)

on:
  schedule:
    # 매 14분마다 실행 (UTC 기준) - Render 15분 절전 방지
    - cron: '*/14 * * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Server
        run: |
          echo "Pinging backend server..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://industry-l08j.onrender.com/ping)
          echo "Backend response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is awake!"
          else
            echo "⚠️ Backend returned $STATUS - may be waking up"
          fi

      - name: Ping Frontend Server
        run: |
          echo "Pinging frontend server..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://industry-frontend-y8x2.onrender.com)
          echo "Frontend response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is awake!"
          else
            echo "⚠️ Frontend returned $STATUS"
          fi
