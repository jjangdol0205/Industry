name: Keepalive Ping (Render Cold Start 완전 방지)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        shell: bash
        run: |
          set +e
          echo "Pinging backend: https://industry-l08j.onrender.com/ping"
          curl -s --max-time 55 --retry 2 --retry-delay 5 \
            -o /dev/null -w "HTTP %{http_code} (%{time_total}s)\n" \
            https://industry-l08j.onrender.com/ping
          echo "Backend ping done at $(date -u)"
          exit 0

      - name: Ping Frontend
        shell: bash
        run: |
          set +e
          echo "Pinging frontend: https://industry-frontend-y8x2.onrender.com"
          curl -s --max-time 55 --retry 2 --retry-delay 5 \
            -o /dev/null -w "HTTP %{http_code} (%{time_total}s)\n" \
            https://industry-frontend-y8x2.onrender.com
          echo "Frontend ping done at $(date -u)"
          exit 0
