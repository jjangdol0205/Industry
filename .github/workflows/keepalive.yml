name: Keepalive Ping (Render Cold Start 완전 방지)

on:
  schedule:
    # 매 5분마다 실행 - Render 15분 절전 방지 (여유 3배 확보)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동 실행 허용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Server
        run: |
          echo "Pinging backend server..."
          # 첫 번째 시도
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://industry-l08j.onrender.com/ping || echo "000")
          echo "Backend response: $STATUS"
          
          # 서버가 깨어나지 않았으면 한 번 더 시도
          if [ "$STATUS" != "200" ]; then
            echo "Retrying in 10 seconds..."
            sleep 10
            STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://industry-l08j.onrender.com/ping || echo "000")
            echo "Backend retry response: $STATUS2"
          fi
          
          echo "✅ Ping complete at $(date -u)"

      - name: Ping Frontend Server
        run: |
          echo "Pinging frontend server..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://industry-frontend-y8x2.onrender.com || echo "000")
          echo "Frontend response: $STATUS"
          echo "✅ Ping complete at $(date -u)"
